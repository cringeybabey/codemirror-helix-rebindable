default:
  image: node:24-slim
  cache:
    paths:
      - npm_cache
    key:
      files: [package-lock.json]
      prefix: v1

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'

.not_on_mr: &not_on_MR
  if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  when: never

check_dco:
  stage: build
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    - apk add git
  script:
    - |
      NEEDS_DCO=""

      for commit in $(git rev-list $CI_MERGE_REQUEST_DIFF_BASE_SHA..$CI_COMMIT_SHA); do
        signed_off=1
        (git -P show -s "$commit" | grep -i "signed-off-by:" > /dev/null) || signed_off=0

        if test $signed_off = "0"; then
          echo No DCO signature found in commit $commit
          NEEDS_DCO=true
        else
          echo Signature found for $commit
        fi
      done

      echo

      if test -n "$NEEDS_DCO"; then
        echo Check "https://gitlab.com/_rvidal/codemirror-helix/-/blob/master/etc/CONTRIBUTING.md#sign-the-dco"
        exit 1
      else
        echo All commits seem to have signed the DCO.
      fi

build-lib:
  stage: build
  rules:
    - *not_on_MR
    - when: always
  script:
    - npm ci --cache npm_cache
    - npm run build
  artifacts:
    paths:
      - dist

run-tests:
  stage: test
  rules:
    - *not_on_MR
    - if: "$CI_COMMIT_BRANCH"
  before_script:
    - apt update
    - apt install -y libgtk-3-0 libasound2 libx11-xcb-dev libnss3 libgbm-dev libdrm2 xz-utils
  script:
    - npm ci --cache npm_cache
    - npm test

lint:
  stage: test
  rules:
    - *not_on_MR
    - if: "$CI_COMMIT_BRANCH"
  script:
    - npm ci --cache npm_cache
    - npm exec --no prettier -- --check .

pages:
  stage: deploy
  needs:
    - run-tests
  rules:
    - *not_on_MR
    - if: '$CI_PROJECT_NAMESPACE != "_rvidal"'
      when: never
    - if: '"$CI_COMMIT_BRANCH" == "master"'
  before_script:
    - apt update
    - apt-get install -y --no-install-recommends git brotli
  script:
    - npm ci --cache npm_cache
    - cd demo && npm exec --no vite -- build --base="./" && cd ..
    - find demo/dist -type f -regex '.*\.\(htm\|html\|txt\|text\|js\|css\)$' -exec gzip -f -k {} \;
    - find demo/dist -type f -regex '.*\.\(htm\|html\|txt\|text\|js\|css\)$' -exec brotli -f -k {} \;
  publish: demo/dist
  artifacts:
    paths:
      - demo/dist

publish:
  stage: deploy
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  rules:
    - *not_on_MR
    - if: '$CI_PROJECT_NAMESPACE != "_rvidal"'
      when: never
    - if: "$CI_COMMIT_TAG"
  script:
    - npm publish
